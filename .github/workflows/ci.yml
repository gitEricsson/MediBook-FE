name: CI — Frontend

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: medibook-fe-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # NOTE: Cloud Run pulls from Artifact Registry, NOT gcr.io.
  # If you change this, also change the service's image reference in Cloud Run.
  GAR_LOCATION: us-central1
  GAR_REPOSITORY: medibook-repo
  IMAGE_NAME: medibook-fe
  REGION: us-central1
  SERVICE_NAME: medibook-fe
  API_URL: https://api.dreammedibook.com

jobs:
  lint-and-typecheck:
    name: Lint + TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npx tsc --noEmit

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm run test:run

  build-and-scan:
    name: Build image + Trivy scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - lint-and-typecheck
      - unit-tests
    permissions:
      contents: read
      security-events: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        if: github.event_name == 'push'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: github.event_name == 'push'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: github.event_name == 'push'
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ env.API_URL }}
            VITE_ENV=production
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Trivy scan
        id: trivy
        if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@master
        with:
          # Use the tag docker/metadata-action actually produced (short SHA).
          image-ref: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
        continue-on-error: true

      - name: Upload Trivy SARIF
        # Only upload if Trivy actually produced the file.
        if: github.event_name == 'push' && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs:
      - build-and-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy revision to Cloud Run
        run: |
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          echo "Deploying $IMAGE"
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --image "$IMAGE"

      - name: Smoke check live URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} --project ${{ secrets.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "Checking $URL"
          code=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$code" != "200" ]; then
            echo "::error::Smoke check failed: $URL returned HTTP $code"
            # Roll back to previous revision
            PREV=$(gcloud run revisions list --service ${{ env.SERVICE_NAME }} \
              --region ${{ env.REGION }} --project ${{ secrets.GCP_PROJECT_ID }} \
              --sort-by=~metadata.creationTimestamp --format='value(metadata.name)' --limit=2 | tail -n1)
            echo "Rolling back to $PREV"
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
              --region ${{ env.REGION }} --project ${{ secrets.GCP_PROJECT_ID }} \
              --to-revisions "$PREV=100"
            exit 1
          fi
          echo "Live URL OK: $URL"
